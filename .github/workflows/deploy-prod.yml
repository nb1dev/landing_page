name: Merge STG into PROD & Deploy

on:
  push:
    branches:
      - prod

permissions:
  contents: write

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge stg → prod
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin
          git checkout prod
          git merge origin/stg --no-edit || true
          git push origin prod

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /var/www/landing_page
            git fetch origin prod
            git reset --hard origin/prod

            echo ">>> Sync date STG → PROD"
            STG_DB=$(grep "^DATABASE_URL=" .env.stg | cut -d'=' -f2-)
            PROD_DB=$(grep "^DATABASE_URL=" .env.prod | cut -d'=' -f2-)
            DUMP_FILE="/tmp/stg_to_prod_$(date +%Y%m%d_%H%M%S).sql"
            pg_dump "${STG_DB}?sslmode=require" --no-owner --no-privileges -f "$DUMP_FILE"
            psql "${PROD_DB}?sslmode=require" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO CURRENT_USER;" > /dev/null
            psql "${PROD_DB}?sslmode=require" < "$DUMP_FILE" 2>&1 | grep "^ERROR" || true
            rm -f "$DUMP_FILE"
            echo ">>> Sync gata: $(psql ${PROD_DB}?sslmode=require -t -c 'SELECT COUNT(*) FROM pages;' | tr -d ' ') pagini pe PROD"

            bash deploy-prod.sh