name: Sync Main to STG & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync stg to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin
          # stg is a deploy mirror of main. Reset it to main (instead of merging)
          # so a stale/diverged stg or a doc conflict can never silently block the
          # sync again — the old `git merge ... || true` swallowed the README
          # conflict and left stg frozen while the workflow still went green.
          git checkout -B stg origin/main
          git push origin stg --force

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STG_HOST }}
          username: ${{ secrets.STG_USER }}
          key: ${{ secrets.STG_SSH_KEY }}
          script: |
            set -e
            cd /var/www/landing_page
            git fetch origin stg
            git reset --hard origin/stg
            bash deploy-stg.sh
